name: 深海崛金
desc: 自用代理覆写策略，支持stash和clash类。主要功能是抖音评论区直连、港版iPhone苹果AI走ChatGPT策略组、券商Firstrade/FUTU走Telegram策略组。

# 这里的配置会合并并覆盖到你的任何订阅中
dns:
  fake-ip-filter:
    - "*.douyin.com"
    - "*.iesdouyin.com"
    - "*.snssdk.com"
    - "*.amemv.com"
    - "*.douyinstatic.com"
    - "*.byteimg.com"
    - "*.bytetos.com"
    - "*.zijieapi.com"
    - "*.pstatp.com"
    - "*.huoshanstatic.com"
    - "*.douyinpic.com"
    - "*.byted-static.com"

rules:
  # 放在最上方，优先直连抖音
  - DOMAIN-SUFFIX,douyin.com,DIRECT
  - DOMAIN-SUFFIX,iesdouyin.com,DIRECT
  - DOMAIN-SUFFIX,snssdk.com,DIRECT
  - DOMAIN-SUFFIX,amemv.com,DIRECT
  - DOMAIN-SUFFIX,douyinstatic.com,DIRECT
  - DOMAIN-SUFFIX,byteimg.com,DIRECT
  - DOMAIN-SUFFIX,bytetos.com,DIRECT
  - DOMAIN-SUFFIX,zijieapi.com,DIRECT
  - DOMAIN-SUFFIX,pstatp.com,DIRECT
  - DOMAIN-SUFFIX,huoshanstatic.com,DIRECT
  - DOMAIN-SUFFIX,douyinpic.com,DIRECT
  - DOMAIN-SUFFIX,byted-static.com,DIRECT
  - DOMAIN-KEYWORD,douyin,DIRECT
  - DOMAIN-KEYWORD,snssdk,DIRECT

  # Apple AI 强制代理
  # Apple 官方列出的 Apple Intelligence / PCC / Siri 关键主机
  - DOMAIN,apple-relay.cloudflare.com,ChatGPT
  - DOMAIN,apple-relay.fastly-edge.com,ChatGPT
  - DOMAIN,apple-relay.apple.com,ChatGPT
  - DOMAIN,cp4.cloudflare.com,ChatGPT
  - DOMAIN-SUFFIX,smoot.apple.com,ChatGPT

  # Apple Intelligence & 新版 Siri 补充域名
  - DOMAIN-KEYWORD,apple-subsea,ChatGPT
  - DOMAIN-SUFFIX,apple-cloudkit.com,ChatGPT
  - DOMAIN-SUFFIX,blobstore.apple.com,ChatGPT
  - DOMAIN-KEYWORD,privatecloudcompute,ChatGPT
  - DOMAIN-SUFFIX,bag.itunes.apple.com,ChatGPT

  # Siri 与语音识别增强服务
  - DOMAIN,guzzoni.apple.com,ChatGPT
  - DOMAIN-KEYWORD,siri,ChatGPT

  # 附加的 Gateway 与配置下发验证
  - DOMAIN,gateway.icloud.com,ChatGPT
  - DOMAIN,configuration.apple.com,ChatGPT

  # Firstrade 全站代理
  - DOMAIN-SUFFIX,firstrade.com,Telegram

  # 富途全站代理
  - DOMAIN-SUFFIX,futunn.com,Telegram
  - DOMAIN-SUFFIX,futuhk.com,Telegram
